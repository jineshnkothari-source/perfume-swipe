<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>OCD — Record Sale</title>

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

<style>
:root {
  --black:#0A0A08;
  --white:#F2EFE8;
  --border:rgba(242,239,232,0.13);
  --muted:rgba(242,239,232,0.38);
}
body{
  background:var(--black);
  color:var(--white);
  font-family:'DM Sans',sans-serif;
}
.page{max-width:480px;margin:auto;padding:20px}
button{width:100%;padding:14px;margin:6px 0;border:none;background:#fff;color:#000;font-family:'Bebas Neue';font-size:18px}
.selected{background:#fff;color:#000}
input{width:100%;padding:12px;font-size:22px;text-align:center;margin-bottom:10px}
</style>
</head>

<body>

<div class="page">

<h2>Record Sale</h2>

<input id="codeInput" maxlength="3" placeholder="123">

<h3>Fragrance</h3>
<button onclick="selectFrag(this,'Skinny Dip','SKU1')">Skinny Dip</button>
<button onclick="selectFrag(this,'Midnight Snack','SKU2')">Midnight Snack</button>
<button onclick="selectFrag(this,'Freshly Picked','SKU3')">Freshly Picked</button>
<button onclick="selectFrag(this,'Still Not Over It','SKU4')">Still Not Over It</button>
<button onclick="selectFrag(this,'About Last Night','SKU5')">About Last Night</button>

<h3>Size</h3>
<button onclick="selectSize(this,'5ml','100')">5ml</button>
<button onclick="selectSize(this,'50ml','1099')">50ml</button>
<button onclick="selectSize(this,'100ml','2499')">100ml</button>

<h3>Payment</h3>
<button onclick="selectPay(this,'Cash')">Cash</button>
<button onclick="selectPay(this,'GPay')">GPay</button>

<br>

<button onclick="recordSale()">RECORD SALE</button>

</div>

<script>

const SCRIPT_URL = "https://script.google.com/macros/s/AKfycby-es0gcWx9lenRwlvrhByldVHuDwBwmxxS6wfRu6iiiYTOf8dPUumBGKS6NcQXs5-ArQ/exec";

let selFrag=null, selSKU=null, selSize=null, selPrice=null, selPay=null;

// selection
function clearSel(){
  document.querySelectorAll("button").forEach(b=>b.classList.remove("selected"));
}

function selectFrag(el,name,sku){
  clearSel();
  el.classList.add("selected");
  selFrag=name;
  selSKU=sku;
}

function selectSize(el,size,price){
  clearSel();
  el.classList.add("selected");
  selSize=size;
  selPrice=price;
}

function selectPay(el,method){
  clearSel();
  el.classList.add("selected");
  selPay=method;
}

// save
async function recordSale(){

  if(!selFrag || !selSize || !selPay){
    alert("Select all fields");
    return;
  }

  let code = document.getElementById("codeInput").value.trim();

  if(!code){
    code = "WALKIN-" + Date.now();
  }

  const payload = {
    action:"logSale",
    booth_code:code,
    sale_fragrance:selFrag,
    sale_sku:selSKU,
    sale_size:selSize,
    sale_price:selPrice,
    sale_payment:selPay,
    sale_free_item:false,
    sale_notes:"",
    sale_time:new Date().toISOString()
  };

  try{
    await fetch(SCRIPT_URL,{
      method:"POST",
      mode:"no-cors",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify(payload)
    });

    alert("✅ Saved");

    // reset
    document.getElementById("codeInput").value="";
    selFrag=selSKU=selSize=selPrice=selPay=null;

  }catch(e){
    alert("❌ Failed");
  }
}

</script>

</body>
</html>
