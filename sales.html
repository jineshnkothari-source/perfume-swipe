<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OCD — Record Sale</title>

<style>
body { background:#0A0A08; color:#F2EFE8; font-family:sans-serif; }
.page { max-width:420px; margin:auto; padding:20px; }
button { padding:12px; width:100%; margin-top:10px; }
.frag-btn,.size-btn,.pay-btn { border:1px solid #444; padding:10px; margin:5px; cursor:pointer; }
.selected { background:#fff; color:#000; }
</style>
</head>

<body>
<div class="page">

<h2>Record Sale</h2>

<input id="codeInput" placeholder="Enter Code" oninput="onCodeType(this)" />

<h3>Fragrance</h3>
<div id="fragGrid"></div>

<h3>Size</h3>
<div>
<button class="size-btn" onclick="selectSize(this,'5ml','100')">5ml</button>
<button class="size-btn" onclick="selectSize(this,'50ml','1099')">50ml</button>
<button class="size-btn" onclick="selectSize(this,'100ml','2499')">100ml</button>
</div>

<h3>Payment</h3>
<div>
<button class="pay-btn" onclick="selectPay(this,'Cash')">Cash</button>
<button class="pay-btn" onclick="selectPay(this,'GPay')">GPay</button>
</div>

<label>
<input type="checkbox" id="freeCheck" onclick="toggleFree()"> Free Item
</label>

<textarea id="saleNotes" placeholder="Notes"></textarea>

<button id="submitBtn" onclick="recordSale()" disabled>Record Sale</button>

</div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyhzedIvtzD6cVsyQSToZVTsDfFJUA5N0AXRL47t9QXKNJPQFyRep51npQCHXQzyvRKIw/exec";

const FRAGRANCES = [
  { id:'SKU1', name:'Skinny Dip' },
  { id:'SKU2', name:'Midnight Snack' },
  { id:'SKU3', name:'Freshly Picked' },
  { id:'SKU4', name:'Still Not Over It' },
  { id:'SKU5', name:'About Last Night' }
];

let selCode=null, selFrag=null, selSize=null, selPrice=null, selPay=null, freeItem=false;

// build UI
function buildFragGrid(){
  document.getElementById('fragGrid').innerHTML =
    FRAGRANCES.map(f =>
      `<button class="frag-btn" onclick="selectFrag(this,'${f.id}','${f.name}')">${f.name}</button>`
    ).join('');
}

// selections
function selectFrag(el,id,name){
  document.querySelectorAll('.frag-btn').forEach(b=>b.classList.remove('selected'));
  el.classList.add('selected');
  selFrag={id,name};
  checkReady();
}

function selectSize(el,size,price){
  document.querySelectorAll('.size-btn').forEach(b=>b.classList.remove('selected'));
  el.classList.add('selected');
  selSize=size; selPrice=price;
  checkReady();
}

function selectPay(el,method){
  document.querySelectorAll('.pay-btn').forEach(b=>b.classList.remove('selected'));
  el.classList.add('selected');
  selPay=method;
  checkReady();
}

function toggleFree(){
  freeItem=document.getElementById('freeCheck').checked;
}

function checkReady(){
  document.getElementById('submitBtn').disabled=!(selFrag && selSize && selPay);
}

// code input
function onCodeType(el){
  el.value=el.value.replace(/\D/g,'').slice(0,3);
  selCode=el.value||null;
}

// 🚀 SAVE FUNCTION (WORKING)
async function recordSale(){

  if(!selFrag || !selSize || !selPay) return;

  let code = selCode || ('WALKIN-'+Date.now());

  const payload = {
    action:'logSale',
    booth_code:code,
    sale_fragrance:selFrag.name,
    sale_sku:selFrag.id,
    sale_size:selSize,
    sale_price:selPrice,
    sale_payment:selPay,
    sale_free_item:freeItem,
    sale_notes:document.getElementById('saleNotes').value.trim(),
    sale_time:new Date().toISOString()
  };

  try{
    await fetch(SCRIPT_URL,{
      method:'POST',
      mode:'no-cors',   // IMPORTANT
      body: JSON.stringify(payload)
    });

    alert("Saved ✅");
    clearAll();

  }catch(e){
    alert("Error ❌");
  }
}

function clearAll(){
  selCode=null; selFrag=null; selSize=null; selPrice=null; selPay=null; freeItem=false;
  document.getElementById('codeInput').value='';
  document.getElementById('saleNotes').value='';
  document.getElementById('freeCheck').checked=false;
  document.querySelectorAll('.selected').forEach(b=>b.classList.remove('selected'));
  document.getElementById('submitBtn').disabled=true;
}

buildFragGrid();
</script>

</body>
</html>
