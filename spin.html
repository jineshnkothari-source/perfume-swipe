<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>OCD — Spin to Win</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
:root {
  --black:  #0A0A08;
  --white:  #F2EFE8;
  --border: rgba(242,239,232,0.13);
  --muted:  rgba(242,239,232,0.38);
  --red:    #E8372A;
  --green:  #3DBF72;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body {
  width: 100%; height: 100%; overflow: hidden;
  background: var(--black); color: var(--white);
  font-family: 'DM Sans', sans-serif;
}

/* ── MAIN LAYOUT — iPad portrait vertical stack ── */
#main {
  display: flex; flex-direction: column;
  align-items: center;
  height: 100vh;
  padding: 18px 24px 14px;
  gap: 12px;
}

/* top bar */
.top-bar {
  width: 100%; display: flex;
  align-items: center; justify-content: space-between;
  flex-shrink: 0;
}
.logo { font-family: 'Bebas Neue', sans-serif; font-size: 52px; line-height: 0.88; letter-spacing: 0.06em; }
.logo-sub { font-size: 10px; font-weight: 300; font-style: italic; letter-spacing: 0.1em; color: var(--muted); margin-top: 4px; }
.setup-btn { font-size: 12px; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; cursor: pointer; background: none; border: none; font-family: 'DM Sans', sans-serif; }

/* wheel — takes up as much space as possible */
.wheel-stage {
  position: relative;
  flex: 1;
  width: 100%;
  min-height: 0;
  display: flex;
  align-items: center;
  justify-content: center;
}
.wheel-inner {
  position: relative;
  /* Square, fills the flex space */
  width: min(calc(100vh - 280px), 90vw);
  height: min(calc(100vh - 280px), 90vw);
}
#wheelCanvas { width: 100%; height: 100%; display: block; }
.ring { position: absolute; inset: -6px; border-radius: 50%; border: 1px solid var(--border); animation: pulse 3s ease-in-out infinite; pointer-events: none; }
.ring:nth-child(2) { inset: -14px; animation-delay: 1.2s; opacity: 0.4; }
@keyframes pulse { 0%,100%{opacity:0.2} 50%{opacity:0.65} }
.pointer {
  position: absolute; top: -3px; left: 50%;
  transform: translateX(-50%);
  width: 0; height: 0;
  border-left: 13px solid transparent;
  border-right: 13px solid transparent;
  border-top: 34px solid var(--white);
  z-index: 10;
  filter: drop-shadow(0 2px 8px rgba(0,0,0,1));
}
.hub {
  position: absolute; top: 50%; left: 50%;
  transform: translate(-50%,-50%);
  width: 56px; height: 56px; border-radius: 50%;
  background: #0A0A08; border: 2.5px solid var(--white);
  display: flex; align-items: center; justify-content: center; z-index: 11;
}
.hub-text { font-family: 'Bebas Neue', sans-serif; font-size: 13px; letter-spacing: 0.05em; text-align: center; line-height: 1.1; }

/* result box — inline below wheel */
.result-box {
  width: 100%; flex-shrink: 0;
  background: rgba(242,239,232,0.06);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 16px 20px;
  display: none;
  animation: up 0.3s ease both;
}
.result-box.show { display: block; }
@keyframes up { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
.result-row { display: flex; align-items: center; gap: 16px; }
.result-emoji { font-size: 44px; flex-shrink: 0; line-height: 1; }
.result-text { flex: 1; min-width: 0; }
.result-headline { font-family: 'Bebas Neue', sans-serif; font-size: 34px; letter-spacing: 0.06em; line-height: 1; margin-bottom: 4px; }
.result-label { font-size: 15px; font-weight: 300; color: var(--muted); line-height: 1.4; }
.result-right { text-align: right; flex-shrink: 0; }
.result-code-lbl { font-size: 9px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--muted); margin-bottom: 2px; }
.result-code { font-family: 'Bebas Neue', sans-serif; font-size: 28px; letter-spacing: 0.2em; }

/* code bar */
.code-bar { width: 100%; flex-shrink: 0; }
.code-row { display: flex; gap: 10px; }
#codeInput {
  flex: 1; background: rgba(242,239,232,0.07); border: 1px solid var(--border);
  border-radius: 6px; padding: 14px 18px;
  font-family: 'Bebas Neue', sans-serif; font-size: 30px; letter-spacing: 0.3em;
  color: var(--white); outline: none; text-align: center;
  -webkit-appearance: none; transition: border-color 0.2s;
}
#codeInput::placeholder { color: rgba(242,239,232,0.18); font-size: 20px; }
#codeInput:focus { border-color: rgba(242,239,232,0.4); }
#codeInput.err { border-color: var(--red) !important; animation: shake 0.3s ease; }
#codeInput.ok  { border-color: var(--green) !important; }
@keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-8px)} 75%{transform:translateX(8px)} }
#spinBtn {
  background: var(--white); color: var(--black); border: none;
  padding: 14px 26px; font-family: 'Bebas Neue', sans-serif;
  font-size: 20px; letter-spacing: 0.08em; border-radius: 6px;
  cursor: pointer; white-space: nowrap; flex-shrink: 0;
}
#spinBtn:disabled { opacity: 0.25; cursor: not-allowed; }
.code-fb { font-size: 13px; min-height: 18px; margin-top: 6px; }
.code-fb.err { color: var(--red); }
.code-fb.ok  { color: var(--green); }

/* next btn */
.next-btn {
  width: 100%; background: transparent; border: 1px solid var(--border);
  color: var(--muted); padding: 12px;
  font-family: 'Bebas Neue', sans-serif; font-size: 18px; letter-spacing: 0.08em;
  border-radius: 6px; cursor: pointer; flex-shrink: 0;
  display: none;
}
.next-btn.show { display: block; }

/* ticker */
.ticker-wrap { width: 100%; overflow: hidden; border-top: 1px solid var(--border); padding: 5px 0; flex-shrink: 0; }
.ticker { display: flex; width: max-content; animation: tick 22s linear infinite; }
.ticker-item { font-family: 'Bebas Neue', sans-serif; font-size: 12px; letter-spacing: 0.16em; color: var(--muted); padding: 0 20px; white-space: nowrap; }
@keyframes tick { from{transform:translateX(0)} to{transform:translateX(-50%)} }

/* spin overlay */
.spin-overlay { position: fixed; inset: 0; z-index: 20; background: rgba(10,10,8,0.75); display: none; align-items: center; justify-content: center; }
.spin-overlay.show { display: flex; }
.spin-overlay-label { font-family: 'Bebas Neue', sans-serif; font-size: 32px; letter-spacing: 0.12em; animation: breathe 0.9s ease-in-out infinite; }
@keyframes breathe { 0%,100%{opacity:0.35} 50%{opacity:1} }

/* ── PASSWORD MODAL ── */
#pwModal { position: fixed; inset: 0; z-index: 100; background: rgba(10,10,8,0.94); display: none; align-items: center; justify-content: center; }
#pwModal.show { display: flex; }
.pw-box { background: #131310; border: 1px solid var(--border); border-radius: 12px; padding: 32px 28px; width: 340px; text-align: center; }
.pw-title { font-family: 'Bebas Neue', sans-serif; font-size: 24px; letter-spacing: 0.08em; margin-bottom: 18px; }
#pwInput { width: 100%; background: rgba(242,239,232,0.06); border: 1px solid var(--border); border-radius: 6px; padding: 13px; font-family: 'DM Sans', sans-serif; font-size: 18px; color: var(--white); outline: none; text-align: center; letter-spacing: 0.1em; margin-bottom: 8px; -webkit-appearance: none; }
#pwInput.err { border-color: var(--red); animation: shake 0.3s ease; }
#pwErr { font-size: 13px; color: var(--red); min-height: 18px; margin-bottom: 14px; }
.pw-row { display: flex; gap: 10px; }
.pw-btn { flex: 1; padding: 13px; border-radius: 6px; font-family: 'Bebas Neue', sans-serif; font-size: 18px; letter-spacing: 0.08em; cursor: pointer; border: none; }
.pw-ok { background: var(--white); color: var(--black); }
.pw-cancel { background: transparent; border: 1px solid var(--border) !important; color: var(--muted); }

/* ── SETUP PANEL ── */
#setup { position: fixed; inset: 0; z-index: 50; background: var(--black); display: none; flex-direction: column; padding: 28px 24px 24px; overflow-y: auto; }
#setup.open { display: flex; }
.s-title { font-family: 'Bebas Neue', sans-serif; font-size: 30px; letter-spacing: 0.06em; margin-bottom: 4px; }
.s-sub { font-size: 14px; color: var(--muted); font-weight: 300; margin-bottom: 22px; line-height: 1.5; }
.fl { font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; margin-top: 18px; display: block; }
.fi { width: 100%; background: rgba(242,239,232,0.05); border: 1px solid var(--border); border-radius: 6px; padding: 12px 14px; font-family: 'DM Sans', sans-serif; font-size: 14px; color: var(--white); outline: none; -webkit-appearance: none; }
.fi:focus { border-color: rgba(242,239,232,0.32); }
.sdiv { border: none; border-top: 1px solid var(--border); margin: 18px 0; }

/* Prize rows */
.prize-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 12px; }
.pr {
  display: flex; gap: 8px; align-items: center;
  background: rgba(242,239,232,0.04); border: 1px solid var(--border);
  border-radius: 6px; padding: 10px 12px;
}
.pr input[type=text] { flex: 1; background: transparent; border: none; outline: none; font-family: 'DM Sans', sans-serif; font-size: 14px; color: var(--white); min-width: 0; }
.pr input[type=text]::placeholder { color: var(--muted); }
.pr-type { font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; padding: 4px 8px; border-radius: 3px; flex-shrink: 0; font-weight: 500; }
.t-free  { background: rgba(61,191,114,0.15); color: #3DBF72; }
.t-buy   { background: rgba(91,127,181,0.18); color: #7BAAD4; }
.t-again { background: rgba(242,239,232,0.08); color: var(--muted); }

/* Percentage input */
.pct-wrap { display: flex; align-items: center; gap: 4px; flex-shrink: 0; }
.pct-input {
  width: 52px; text-align: center;
  background: rgba(242,239,232,0.07); border: 1px solid var(--border);
  border-radius: 4px; outline: none;
  font-family: 'DM Sans', sans-serif; font-size: 14px; color: var(--white);
  padding: 4px 4px; -webkit-appearance: none;
}
.pct-input:focus { border-color: rgba(242,239,232,0.35); }
.pct-symbol { font-size: 13px; color: var(--muted); }
.pct-total { font-size: 12px; color: var(--muted); margin-bottom: 6px; }
.pct-total.warn { color: var(--red); }
.pct-total.ok   { color: var(--green); }

.del { background: none; border: none; color: var(--muted); font-size: 20px; cursor: pointer; padding: 0 4px; flex-shrink: 0; }
.del:hover { color: var(--red); }
.add-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 10px; }
.add { background: transparent; border: 1px solid var(--border); color: var(--muted); padding: 8px 14px; font-family: 'DM Sans', sans-serif; font-size: 13px; border-radius: 6px; cursor: pointer; }
.wt-note { font-size: 12px; color: var(--muted); line-height: 1.5; margin-bottom: 6px; }
.s-footer { display: flex; gap: 12px; margin-top: 28px; }
.s-save { background: var(--white); color: var(--black); border: none; padding: 14px 0; flex: 1; font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: 0.08em; border-radius: 6px; cursor: pointer; }
.s-cancel { background: transparent; border: 1px solid var(--border); color: var(--muted); padding: 14px 20px; font-family: 'DM Sans', sans-serif; font-size: 14px; border-radius: 6px; cursor: pointer; }
</style>
</head>
<body>

<!-- PASSWORD MODAL -->
<div id="pwModal">
  <div class="pw-box">
    <div class="pw-title">Enter Password</div>
    <input id="pwInput" type="password" placeholder="••••••••" onkeydown="if(event.key==='Enter')checkPw()">
    <div id="pwErr"></div>
    <div class="pw-row">
      <button class="pw-btn pw-cancel" onclick="closePw()">Cancel</button>
      <button class="pw-btn pw-ok" onclick="checkPw()">Enter</button>
    </div>
  </div>
</div>

<!-- SETUP PANEL -->
<div id="setup">
  <div class="s-title">Setup</div>
  <p class="s-sub">Password-protected. Percentages must add up to 100%.</p>
  <label class="fl">Google Apps Script URL</label>
  <input class="fi" id="cfgUrl" type="url" placeholder="https://script.google.com/macros/s/…/exec">
  <hr class="sdiv">
  <label class="fl">Prizes on the wheel</label>
  <p class="wt-note">Set the % chance for each prize. Total must equal 100%.</p>
  <div class="pct-total" id="pctTotal">Total: 0%</div>
  <div class="prize-list" id="prizeList"></div>
  <div class="add-row">
    <button class="add" onclick="addPrize('free','🎁 Free stickers',12.5)">+ Free goody</button>
    <button class="add" onclick="addPrize('buy','Buy any → get merch free',12.5)">+ Buy → get free</button>
    <button class="add" onclick="addPrize('again','404: Obsession not found',12.5)">+ Try again</button>
  </div>
  <div class="s-footer">
    <button class="s-cancel" onclick="closeSetup()">Cancel</button>
    <button class="s-save" onclick="saveSetup()">Save & Close</button>
  </div>
</div>

<!-- MAIN -->
<div id="main">

  <div class="top-bar">
    <div>
      <div class="logo">OCD</div>
      <div class="logo-sub">Obsessive. Compulsive. Delicious.</div>
    </div>
    <button class="setup-btn" onclick="requestSetup()">⚙ setup</button>
  </div>

  <div class="wheel-stage">
    <div class="wheel-inner" id="wheelInner">
      <canvas id="wheelCanvas" width="800" height="800"></canvas>
      <div class="ring"></div>
      <div class="ring"></div>
      <div class="pointer"></div>
      <div class="hub"><div class="hub-text">OCD</div></div>
    </div>
  </div>

  <!-- RESULT — inline below wheel -->
  <div class="result-box" id="resultBox">
    <div class="result-row">
      <div class="result-emoji" id="rEmoji">🎁</div>
      <div class="result-text">
        <div class="result-headline" id="rHeadline">YOU WON</div>
        <div class="result-label" id="rLabel"></div>
      </div>
      <div class="result-right">
        <div class="result-code-lbl">Code</div>
        <div class="result-code" id="rCode">—</div>
      </div>
    </div>
  </div>

  <div class="code-bar">
    <div class="code-row">
      <input id="codeInput" type="text" inputmode="numeric" maxlength="3"
        placeholder="123" autocomplete="off"
        oninput="onType(this)" onkeydown="if(event.key==='Enter')go()">
      <button id="spinBtn" onclick="go()">SPIN →</button>
    </div>
    <div class="code-fb" id="codeFb"></div>
  </div>

  <button class="next-btn" id="nextBtn" onclick="reset()">Next Customer →</button>

  <div class="ticker-wrap"><div class="ticker" id="ticker"></div></div>
</div>

<div class="spin-overlay" id="spinOverlay"><div class="spin-overlay-label">SPINNING…</div></div>

<script>
const SETUP_PASSWORD = 'Zylohob@2025';

const SEG_COLORS = [
  { fill:'#5B7FB5', text:'#FFFFFF' },
  { fill:'#5A2510', text:'#F2EFE8' },
  { fill:'#C8B89A', text:'#2A1A0A' },
  { fill:'#6B1E24', text:'#F2EFE8' },
  { fill:'#8A9E72', text:'#1A2010' },
  { fill:'#2A2218', text:'#C8B89A' },
  { fill:'#3D5A3E', text:'#E8F0E0' },
  { fill:'#4A3020', text:'#F0D8B8' },
];

const EMOJIS = { free:'🎁', buy:'✨', again:'🔄' };

// Default 8 prizes at 12.5% each
const DEFAULTS = {
  scriptUrl: '',
  prizes: [
    { label:'🎁 Wear the obsession',          type:'free',  pct:12.5 },
    { label:'🎁 Get free stickers',            type:'free',  pct:12.5 },
    { label:'Buy any vial @100 + free merch',  type:'buy',   pct:12.5 },
    { label:'404: Obsession not found',        type:'again', pct:12.5 },
    { label:'🎁 get a scent card of your fav', type:'free',  pct:12.5 },
    { label:'🎁 Wear the obsession',           type:'free',  pct:12.5 },
    { label:'🎁 Get free stickers',            type:'free',  pct:12.5 },
    { label:'404: Obsession not found',        type:'again', pct:12.5 },
  ]
};

let CFG       = loadCFG();
let codeCache = loadCache();
let usedToday = loadUsed();
let curCode   = null;
let spinning  = false;
let currentAngle = 0;

function loadCFG()   { try{return Object.assign({},DEFAULTS,JSON.parse(localStorage.getItem('ocdCFG3')||'{}'));}catch{return Object.assign({},DEFAULTS);} }
function saveCFG()   { localStorage.setItem('ocdCFG3',JSON.stringify(CFG)); }
function loadCache() { try{return JSON.parse(localStorage.getItem('ocdCache')||'{}');}catch{return {};} }
function saveCache() { localStorage.setItem('ocdCache',JSON.stringify(codeCache)); }
function loadUsed()  { try{return JSON.parse(localStorage.getItem('ocdUsed')||'{}');}catch{return {};} }
function saveUsed()  { localStorage.setItem('ocdUsed',JSON.stringify(usedToday)); }
function todayKey(c){ return new Date().toISOString().slice(0,10)+':'+String(c).trim(); }
function todayStr()  { return new Date().toISOString().slice(0,10); }

function pruneCache(){
  const cut=Date.now()-86400000;
  Object.keys(codeCache).forEach(k=>{if(codeCache[k].ts<cut)delete codeCache[k];});
  saveCache();
}

// ── PASSWORD ─────────────────────────────────────────────────
function requestSetup(){
  document.getElementById('pwInput').value='';
  document.getElementById('pwErr').textContent='';
  document.getElementById('pwInput').classList.remove('err');
  document.getElementById('pwModal').classList.add('show');
  setTimeout(()=>document.getElementById('pwInput').focus(),120);
}
function closePw(){ document.getElementById('pwModal').classList.remove('show'); }
function checkPw(){
  if(document.getElementById('pwInput').value===SETUP_PASSWORD){
    closePw(); openSetup();
  } else {
    document.getElementById('pwInput').classList.add('err');
    document.getElementById('pwErr').textContent='Incorrect.';
    document.getElementById('pwInput').value='';
    setTimeout(()=>document.getElementById('pwInput').classList.remove('err'),600);
  }
}

// ── SETUP ────────────────────────────────────────────────────
function openSetup(){
  document.getElementById('cfgUrl').value=CFG.scriptUrl||'';
  renderPrizes();
  document.getElementById('setup').classList.add('open');
}
function closeSetup(){ document.getElementById('setup').classList.remove('open'); }

function saveSetup(){
  const total = getPctTotal();
  if(Math.abs(total-100) > 0.1){
    alert(`Percentages add up to ${total.toFixed(1)}% — must be exactly 100%.`);
    return;
  }
  CFG.scriptUrl=document.getElementById('cfgUrl').value.trim();
  CFG.prizes=[];
  document.querySelectorAll('#prizeList .pr').forEach(row=>{
    const label=row.querySelector('input[type=text]').value.trim();
    const type=row.dataset.type;
    const pct=parseFloat(row.querySelector('.pct-input').value)||0;
    if(label) CFG.prizes.push({label,type,pct});
  });
  saveCFG(); drawWheel(); closeSetup();
}

function renderPrizes(){
  document.getElementById('prizeList').innerHTML=CFG.prizes.map(p=>prHTML(p)).join('');
  updatePctTotal();
}
function prHTML(p){
  const c=p.type==='free'?'free':p.type==='buy'?'buy':'again';
  return `<div class="pr" data-type="${p.type}">
    <span class="pr-type t-${c}">${p.type}</span>
    <input type="text" value="${p.label}" placeholder="Prize name">
    <div class="pct-wrap">
      <input type="number" class="pct-input" min="0" max="100" step="0.5"
        value="${p.pct}" oninput="updatePctTotal()">
      <span class="pct-symbol">%</span>
    </div>
    <button class="del" onclick="this.closest('.pr').remove();updatePctTotal()">×</button>
  </div>`;
}
function addPrize(type,label,pct){
  const d=document.createElement('div');
  d.innerHTML=prHTML({label,type,pct});
  document.getElementById('prizeList').appendChild(d.firstElementChild);
  updatePctTotal();
}
function getPctTotal(){
  let t=0;
  document.querySelectorAll('.pct-input').forEach(i=>{ t+=parseFloat(i.value)||0; });
  return Math.round(t*10)/10;
}
function updatePctTotal(){
  const t=getPctTotal();
  const el=document.getElementById('pctTotal');
  el.textContent=`Total: ${t}%`;
  el.className='pct-total'+(Math.abs(t-100)<0.1?' ok':t>100?' warn':'');
}

// ── WHEEL ────────────────────────────────────────────────────
function drawWheel(angle){
  angle = (angle !== undefined) ? angle : currentAngle;
  const canvas=document.getElementById('wheelCanvas');
  const ctx=canvas.getContext('2d');
  const prizes=CFG.prizes;
  if(!prizes.length){ ctx.clearRect(0,0,800,800); return; }

  const cx=400, cy=400, r=390;
  const n=prizes.length;
  const arc=(2*Math.PI)/n;
  ctx.clearRect(0,0,800,800);

  prizes.forEach((p,i)=>{
    const c=SEG_COLORS[i%SEG_COLORS.length];
    const segStart=angle+i*arc-Math.PI/2;
    const segEnd=segStart+arc;

    ctx.beginPath(); ctx.moveTo(cx,cy);
    ctx.arc(cx,cy,r,segStart,segEnd); ctx.closePath();
    ctx.fillStyle=c.fill; ctx.fill();
    ctx.strokeStyle='rgba(10,10,8,0.7)'; ctx.lineWidth=2.5; ctx.stroke();

    // Text at 70% radius, centred on segment
    const midAngle=segStart+arc/2;
    const textR=r*0.68;
    const tx=cx+textR*Math.cos(midAngle);
    const ty=cy+textR*Math.sin(midAngle);

    ctx.save();
    ctx.translate(tx,ty);
    ctx.rotate(midAngle+Math.PI/2);
    ctx.fillStyle=c.text;
    ctx.textAlign='center';

    // Font size: bigger for fewer segments
    const fs = n<=4 ? 26 : n<=6 ? 22 : n<=8 ? 18 : 14;
    ctx.font=`700 ${fs}px 'DM Sans', sans-serif`;

    // Strip emoji, word-wrap
    let txt=p.label.replace(/[\u{1F000}-\u{1FFFF}]|[\u2600-\u27FF]|[🎁✨🔄]/gu,'').trim();
    const words=txt.split(' ');
    const maxLineW=r*0.52;
    const lines=[]; let cur='';
    words.forEach(w=>{
      const test=cur?cur+' '+w:w;
      if(ctx.measureText(test).width<maxLineW){ cur=test; }
      else{ if(cur)lines.push(cur); cur=w; }
    });
    if(cur)lines.push(cur);
    const displayLines=lines.slice(0,3);
    const lineH=fs+4;
    const totalH=displayLines.length*lineH;
    displayLines.forEach((l,li)=>{
      ctx.fillText(l, 0, -totalH/2+li*lineH+fs*0.5);
    });
    ctx.restore();
  });

  // Outer ring
  ctx.beginPath(); ctx.arc(cx,cy,r,0,2*Math.PI);
  ctx.strokeStyle='rgba(242,239,232,0.28)'; ctx.lineWidth=3.5; ctx.stroke();

  // Centre hub
  ctx.beginPath(); ctx.arc(cx,cy,40,0,2*Math.PI);
  ctx.fillStyle='#0A0A08'; ctx.fill();
  ctx.strokeStyle='rgba(242,239,232,0.7)'; ctx.lineWidth=2.5; ctx.stroke();
}

// ── TICKER ───────────────────────────────────────────────────
function buildTicker(){
  const items=['SKINNY DIP','·','MIDNIGHT SNACK','·','FRESHLY PICKED','·','STILL NOT OVER IT','·','ABOUT LAST NIGHT','·','OBSESSIVE','·','COMPULSIVE','·','DELICIOUS','·'];
  const d=[...items,...items];
  document.getElementById('ticker').innerHTML=d.map(t=>`<span class="ticker-item">${t}</span>`).join('');
}

// ── CODE INPUT ───────────────────────────────────────────────
function onType(el){
  el.value=el.value.replace(/\D/g,'').slice(0,3);
  el.classList.remove('err','ok'); fb('','');
}
function fb(msg,cls){
  const el=document.getElementById('codeFb');
  el.textContent=msg;
  el.className='code-fb'+(cls?' '+cls:'');
}

async function go(){
  if(spinning) return;
  const raw=document.getElementById('codeInput').value.trim();
  if(!raw||raw.length<3){ fb('Enter your 3-digit code','err'); return; }

  const inp=document.getElementById('codeInput');
  const btn=document.getElementById('spinBtn');
  btn.disabled=true; btn.textContent='…';

  if(usedToday[todayKey(raw)]){
    inp.classList.add('err'); fb('Already spun today.','err');
    btn.disabled=false; btn.textContent='SPIN →'; return;
  }

  pruneCache();
  const ckey=todayStr()+':'+raw;
  const cached=codeCache[ckey];
  if(cached){
    if(cached.spun){ inp.classList.add('err'); fb('Already spun today.','err'); btn.disabled=false; btn.textContent='SPIN →'; return; }
    inp.classList.add('ok'); curCode=raw; btn.disabled=false; btn.textContent='SPIN →'; doSpin(); return;
  }

  if(!CFG.scriptUrl){ inp.classList.add('err'); fb('Paste Apps Script URL in ⚙ setup first.','err'); btn.disabled=false; btn.textContent='SPIN →'; return; }

  try{
    const res=await fetch(`${CFG.scriptUrl}?action=lookup&booth_code=${encodeURIComponent(raw)}`);
    const data=await res.json();
    if(!data.found){ inp.classList.add('err'); fb('Code not found — check survey page.','err'); btn.disabled=false; btn.textContent='SPIN →'; return; }
    if(data.spun){
      inp.classList.add('err'); fb('Already spun today.','err');
      codeCache[ckey]={verified:true,spun:true,ts:Date.now()}; saveCache();
      btn.disabled=false; btn.textContent='SPIN →'; return;
    }
    codeCache[ckey]={verified:true,spun:false,ts:Date.now()}; saveCache();
    inp.classList.add('ok'); curCode=raw; btn.disabled=false; btn.textContent='SPIN →'; doSpin();
  }catch(e){
    inp.classList.add('err'); fb('Network error — check internet.','err');
    btn.disabled=false; btn.textContent='SPIN →';
  }
}

// ── SPIN ─────────────────────────────────────────────────────
// Uses percentage weights to pick winner
function pctPick(){
  // Build cumulative thresholds from pct values
  const prizes=CFG.prizes;
  const total=prizes.reduce((s,p)=>s+(p.pct||0),0);
  const r=Math.random()*total;
  let cum=0;
  for(let i=0;i<prizes.length;i++){
    cum+=prizes[i].pct||0;
    if(r<=cum) return i;
  }
  return prizes.length-1;
}

function doSpin(){
  spinning=true;
  document.getElementById('resultBox').classList.remove('show');
  document.getElementById('nextBtn').classList.remove('show');
  document.getElementById('spinOverlay').classList.add('show');

  const n=CFG.prizes.length;
  const arc=(2*Math.PI)/n;
  const winIdx=pctPick();

  // Pointer at top (12 o'clock) = angle -π/2 in canvas space
  // Segment i centre after rotation = currentAngle + i*arc + arc/2 - π/2
  // We want winIdx segment centre to be at -π/2
  // => currentAngle + totalSpin + winIdx*arc + arc/2 - π/2 = -π/2 + 2kπ
  // => totalSpin = -(currentAngle + winIdx*arc + arc/2) + 2kπ
  const rawTarget = -(currentAngle + winIdx*arc + arc/2);
  const normTarget = ((rawTarget % (2*Math.PI)) + 2*Math.PI) % (2*Math.PI);
  const fullSpins = (6+Math.floor(Math.random()*4))*2*Math.PI;
  const totalSpin = fullSpins + normTarget;

  const startAngle=currentAngle;
  const duration=4000+Math.random()*600;
  const t0=performance.now();

  function ease(t){ return 1-Math.pow(1-t,4); }
  function frame(now){
    const p=Math.min((now-t0)/duration,1);
    currentAngle=startAngle+totalSpin*ease(p);
    drawWheel(currentAngle);
    if(p<1){ requestAnimationFrame(frame); }
    else{
      currentAngle=startAngle+totalSpin;
      drawWheel(currentAngle);
      spinning=false;
      document.getElementById('spinOverlay').classList.remove('show');
      showResult(winIdx);
    }
  }
  requestAnimationFrame(frame);
}

// ── RESULT ───────────────────────────────────────────────────
function showResult(idx){
  const prize=CFG.prizes[idx];
  const isWin=prize.type!=='again';
  document.getElementById('rEmoji').textContent=EMOJIS[prize.type]||'🎉';
  document.getElementById('rHeadline').textContent=isWin?'YOU WON':'TRY AGAIN';
  document.getElementById('rLabel').textContent=prize.label.replace(/[\u{1F000}-\u{1FFFF}]|[\u2600-\u27FF]|[🎁✨🔄]/gu,'').trim();
  document.getElementById('rCode').textContent=curCode;
  document.getElementById('resultBox').classList.add('show');
  document.getElementById('nextBtn').classList.add('show');
  document.getElementById('spinBtn').disabled=true;

  usedToday[todayKey(curCode)]=true; saveUsed();
  const ckey=todayStr()+':'+curCode;
  if(codeCache[ckey]){ codeCache[ckey].spun=true; saveCache(); }
  logSpin(prize);
}

async function logSpin(prize){
  if(!CFG.scriptUrl) return;
  try{
    fetch(CFG.scriptUrl,{
      method:'POST', mode:'no-cors',
      headers:{'Content-Type':'text/plain'},
      body:JSON.stringify({action:'logSpin',booth_code:curCode,spin_prize:prize.label,spin_type:prize.type,spin_time:new Date().toISOString()})
    });
  }catch(e){}
}

function reset(){
  curCode=null;
  document.getElementById('resultBox').classList.remove('show');
  document.getElementById('nextBtn').classList.remove('show');
  document.getElementById('codeInput').value='';
  document.getElementById('codeInput').className='';
  document.getElementById('spinBtn').disabled=false;
  document.getElementById('spinBtn').textContent='SPIN →';
  fb('','');
}

// ── INIT ─────────────────────────────────────────────────────
buildTicker();
drawWheel(0);
pruneCache();
